<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <!-- Dark gradient background -->
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="456" height="456" fill="url(#bgGradient)" />

    <!-- Candlestick chart pattern -->
    <g stroke="#60A5FA" stroke-width="8" stroke-linecap="round" fill="none">
        <!-- Candle 1: Down -->
        <line x1="60" y1="240" x2="60" y2="300" />
        <rect x="45" y="270" width="30" height="30" fill="none" stroke="#60A5FA" stroke-width="3" />

        <!-- Candle 2: Up -->
        <line x1="140" y1="320" x2="140" y2="200" />
        <rect x="125" y="220" width="30" height="25" fill="none" stroke="#4ADE80" stroke-width="3" />

        <!-- Candle 3: Down -->
        <line x1="220" y1="260" x2="220" y2="330" />
        <rect x="205" y="290" width="30" height="20" fill="none" stroke="#60A5FA" stroke-width="3" />

        <!-- Candle 4: Up (strong) -->
        <line x1="300" y1="280" x2="300" y2="150" />
        <rect x="285" y="180" width="30" height="40" fill="none" stroke="#4ADE80" stroke-width="3" />

        <!-- Candle 5: Up -->
        <line x1="380" y1="240" x2="380" y2="120" />
        <rect x="365" y="140" width="30" height="35" fill="none" stroke="#4ADE80" stroke-width="3" />
    </g>

    <!-- Trend line -->
    <polyline points="50,310 100,270 160,220 220,260 280,180 340,140 400,100" stroke="#60A5FA" stroke-width="3" fill="none" opacity="0.6" stroke-dasharray="4,4" />
</svg>